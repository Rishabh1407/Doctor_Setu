<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Profile - DoctorSetu</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="patient-select.css">
</head>
<body>

  <div class="page">
    <div class="header">
      <div class="brand"><i class="fas fa-heartbeat"></i> DoctorSetu</div>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="content">
      <h2>Who's the patient today?</h2>
      <p class="sub">Select an existing profile or add a new family member</p>

      <div id="profilesGrid" class="profiles-grid">
        <div class="loading-card"><i class="fas fa-spinner fa-spin"></i> Loading profiles...</div>
      </div>
    </div>
  </div>

  <!-- ADD NEW MEMBER MODAL -->
  <div id="addModal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i class="fas fa-user-plus"></i> Add Family Member</h3>
        <span class="close-modal" onclick="closeModal()">&times;</span>
      </div>

      <form id="addForm">
        <div class="form-row">
          <div class="form-group">
            <label>First Name *</label>
            <input type="text" name="firstName" required>
          </div>
          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" name="lastName" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Age *</label>
            <input type="number" name="age" min="1" max="120" required>
          </div>
          <div class="form-group">
            <label>Gender *</label>
            <select name="gender" required>
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Relation *</label>
            <select name="relation" required>
              <option value="">Select</option>
              <option>Self</option>
              <option>Parent</option>
              <option>Child</option>
              <option>Spouse</option>
              <option>Sibling</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Blood Group</label>
            <select name="bloodGroup">
              <option value="">Select</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>O+</option><option>O-</option>
              <option>AB+</option><option>AB-</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email">
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea name="address" rows="2"></textarea>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-plus"></i> Add Member
        </button>
        <p id="formMsg" class="form-msg"></p>
      </form>
    </div>
  </div>

  <script src="patient-select.js"></script>
</body>
</html>
